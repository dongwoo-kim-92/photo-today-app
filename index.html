<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장 사진 업로드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1a6b4a; --primary-light: #e8f5f0; --primary-mid: #2d9969;
    --bg: #f4f6f5; --card: #ffffff; --text: #1c2b24; --muted: #6b8c7a;
    --border: #d4e3dc; --danger: #e24b4a;
    --shadow: 0 2px 12px rgba(26,107,74,0.08);
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--primary); color: white; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .header-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 1px; }

  .container { max-width: 540px; margin: 0 auto; padding: 1.25rem 1rem 6rem; }

  .nav-tabs { display: flex; background: var(--card); border-radius: 12px; padding: 4px; border: 1px solid var(--border); margin-bottom: 1.25rem; gap: 4px; }
  .nav-tab { flex: 1; padding: 8px 4px; border: none; background: transparent; border-radius: 9px; font-size: 12px; font-weight: 500; font-family: inherit; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .nav-tab.active { background: var(--primary); color: white; font-weight: 700; }

  .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
  .card-label { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }

  input[type="text"], textarea {
    width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 15px; font-family: inherit; color: var(--text);
    background: var(--bg); outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--primary); background: white; }
  textarea { resize: none; min-height: 80px; }

  /* Autocomplete */
  .search-wrap { position: relative; }
  .search-selected {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1rem; border: 1.5px solid var(--primary);
    border-radius: 10px; background: var(--primary-light);
    font-size: 15px; font-weight: 700; color: var(--primary);
  }
  .search-clear { background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; line-height: 1; padding: 0; font-weight: 400; }
  .search-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: white; border: 1.5px solid var(--border); border-radius: 12px;
    z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    max-height: 220px; overflow-y: auto;
  }
  .search-item { padding: 12px 16px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--primary-light); color: var(--primary); font-weight: 500; }
  .search-empty { padding: 14px 16px; font-size: 13px; color: var(--muted); text-align: center; }

  /* Date */
  .date-display { background: var(--primary-light); border: 1.5px solid var(--primary); border-radius: 10px; padding: 0.75rem 1rem; font-size: 15px; font-weight: 700; color: var(--primary); }

  /* Location */
  .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .loc-btn { padding: 0.85rem 0.5rem; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); font-size: 13px; font-family: inherit; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.2s; font-weight: 500; }
  .loc-btn:hover { border-color: var(--primary); color: var(--primary); }
  .loc-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 700; }
  .loc-emoji { font-size: 20px; display: block; margin-bottom: 4px; }
  .custom-loc-wrap { margin-top: 8px; display: none; }
  .custom-loc-wrap.visible { display: block; }

  /* Upload */
  .upload-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .upload-btn { border: 2px dashed var(--border); border-radius: 14px; padding: 1.25rem 0.5rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); font-family: inherit; width: 100%; }
  .upload-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .upload-btn input { display: none; }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-label { font-size: 13px; font-weight: 700; color: var(--primary); display: block; }
  .upload-sub { font-size: 11px; color: var(--muted); margin-top: 2px; display: block; }
  .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .preview-item { position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 9px; padding: 3px 4px; text-align: center; }
  .preview-remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.65); color: white; border: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .photo-count { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: right; }

  /* Submit */
  .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); padding: 1rem; }
  .submit-btn { width: 100%; max-width: 540px; margin: 0 auto; display: block; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .submit-btn:hover { background: var(--primary-mid); }
  .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

  /* Progress */
  .progress-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .progress-overlay.show { display: flex; }
  .progress-box { background: white; border-radius: 20px; padding: 2rem; width: 300px; text-align: center; }
  .progress-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .progress-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
  .progress-bar-wrap { background: var(--bg); border-radius: 999px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width 0.3s; width: 0%; }

  /* Toast */
  .toast { display: none; position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 700; z-index: 999; white-space: nowrap; }
  .toast.error { background: var(--danger); }

  /* Auth */
  .auth-banner { background: var(--primary-light); border: 1.5px solid var(--primary); border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
  .auth-banner-text { flex: 1; font-size: 13px; color: var(--primary); }
  .auth-banner-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
  .auth-btn { padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }

  /* Gallery */
  #gallery-view { display: none; }
  .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .gallery-header h2 { font-size: 17px; font-weight: 700; }
  .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 1rem; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { padding: 6px 14px; border-radius: 999px; border: 1.5px solid var(--border); background: var(--card); font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s; }
  .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }
  .gallery-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 1rem; overflow: hidden; }
  .gallery-card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .gallery-card-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .gallery-card-meta { font-size: 12px; color: var(--muted); }
  .gallery-note { padding: 10px 16px; font-size: 13px; color: var(--muted); border-top: 1px solid var(--border); }
  .gallery-link { padding: 10px 16px; font-size: 12px; border-top: 1px solid var(--border); }
  .gallery-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* Manage */
  #manage-view { display: none; }
  .manage-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .manage-add-row input { flex: 1; }
  .manage-add-btn { padding: 0 1rem; height: 48px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
  .manage-list-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; font-size: 14px; }
  .del-btn { background: none; border: none; color: var(--danger); font-size: 20px; cursor: pointer; line-height: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📸</div>
  <div>
    <h1>현장 사진 업로드</h1>
    <p id="headerDate"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <div class="progress-title">📤 업로드 중...</div>
    <div class="progress-sub" id="progressSub">구글 드라이브에 저장하고 있어요</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="container">
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('upload')">📤 업로드</button>
    <button class="nav-tab" onclick="switchTab('gallery')">🗂 갤러리</button>
    <button class="nav-tab" onclick="switchTab('manage')">⚙️ 관리</button>
  </div>

  <!-- UPLOAD VIEW -->
  <div id="upload-view">
    <div class="auth-banner" id="authBanner">
      <div class="auth-banner-text">
        <strong>🔐 구글 계정 로그인 필요</strong>
        사진을 드라이브에 저장하려면 로그인해 주세요
      </div>
      <button class="auth-btn" onclick="signIn()">로그인</button>
    </div>

    <div class="card">
      <div class="card-label">📅 오늘 날짜</div>
      <div class="date-display" id="dateDisplay"></div>
    </div>

    <div class="card">
      <div class="card-label">👤 직원 선택</div>
      <div class="search-wrap">
        <div class="search-selected" id="workerSelected" style="display:none;">
          <span id="workerSelectedText"></span>
          <button class="search-clear" onclick="clearSearch('worker')">×</button>
        </div>
        <input type="text" id="workerSearch" placeholder="이름 검색 후 선택..." oninput="filterList('worker')" onfocus="openDropdown('worker')" autocomplete="off">
        <div class="search-dropdown" id="workerDropdown" style="display:none;"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">🏢 거래처 선택</div>
      <div class="search-wrap">
        <div class="search-selected" id="clientSelected" style="display:none;">
          <span id="clientSelectedText"></span>
          <button class="search-clear" onclick="clearSearch('client')">×</button>
        </div>
        <input type="text" id="clientSearch" placeholder="거래처 검색 후 선택..." oninput="filterList('client')" onfocus="openDropdown('client')" autocomplete="off">
        <div class="search-dropdown" id="clientDropdown" style="display:none;"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">📍 청소 장소</div>
      <div class="location-grid">
        <button class="loc-btn" onclick="selectLoc(this,'거실')"><span class="loc-emoji">🛋️</span>거실</button>
        <button class="loc-btn" onclick="selectLoc(this,'주방')"><span class="loc-emoji">🍳</span>주방</button>
        <button class="loc-btn" onclick="selectLoc(this,'욕실')"><span class="loc-emoji">🚿</span>욕실</button>
        <button class="loc-btn" onclick="selectLoc(this,'침실')"><span class="loc-emoji">🛏️</span>침실</button>
        <button class="loc-btn" onclick="selectLoc(this,'베란다')"><span class="loc-emoji">🪴</span>베란다</button>
        <button class="loc-btn" onclick="selectLoc(this,'현관')"><span class="loc-emoji">🚪</span>현관</button>
        <button class="loc-btn" onclick="selectLoc(this,'전체')"><span class="loc-emoji">🏠</span>전체</button>
        <button class="loc-btn" onclick="selectLoc(this,'직접입력')"><span class="loc-emoji">✏️</span>직접입력</button>
      </div>
      <div class="custom-loc-wrap" id="customLocWrap">
        <input type="text" id="customLoc" placeholder="장소명 입력" oninput="updateBtn()">
      </div>
    </div>

    <div class="card">
      <div class="card-label">🖼️ 현장 사진</div>
      <div class="upload-btn-row">
        <button class="upload-btn" onclick="document.getElementById('galleryInput').click()">
          <input type="file" id="galleryInput" multiple accept="image/*" onchange="handleFiles(this.files)">
          <div class="upload-icon">🖼️</div>
          <span class="upload-label">갤러리에서 선택</span>
          <span class="upload-sub">찍어둔 사진 불러오기</span>
        </button>
        <button class="upload-btn" onclick="document.getElementById('cameraInput').click()">
          <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFiles(this.files)">
          <div class="upload-icon">📷</div>
          <span class="upload-label">카메라로 찍기</span>
          <span class="upload-sub">지금 바로 촬영</span>
        </button>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
      <div class="photo-count" id="photoCount"></div>
    </div>

    <div class="card">
      <div class="card-label">📝 메모 (선택)</div>
      <textarea id="notes" placeholder="특이사항을 입력하세요..." rows="3"></textarea>
    </div>
  </div>

  <!-- GALLERY VIEW -->
  <div id="gallery-view">
    <div class="gallery-header">
      <h2>현장 기록</h2>
      <a href="https://drive.google.com/drive/folders/1gWSAVwiwe6cRKYmNE2Q3KOY15T-ubA39" target="_blank" style="font-size:13px;color:var(--primary);text-decoration:none;font-weight:500;">📁 드라이브 열기</a>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div id="galleryContent"></div>
  </div>

  <!-- MANAGE VIEW -->
  <div id="manage-view">
    <div class="card">
      <div class="card-label">👤 직원 관리</div>
      <div class="manage-add-row">
        <input type="text" id="newWorkerInput" placeholder="직원 이름 입력">
        <button class="manage-add-btn" onclick="addWorker()">추가</button>
      </div>
      <div id="workerManageList"></div>
    </div>
    <div class="card">
      <div class="card-label">🏢 거래처 관리</div>
      <div class="manage-add-row">
        <input type="text" id="newClientInput" placeholder="거래처명 입력">
        <button class="manage-add-btn" onclick="addClient()">추가</button>
      </div>
      <div id="clientManageList"></div>
    </div>
  </div>
</div>

<div class="submit-bar" id="submitBar">
  <button class="submit-btn" id="submitBtn" onclick="submitUpload()" disabled>업로드하기</button>
</div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CLIENT_ID = '967996916885-jik0ba1t8ll5rrl3ubh7us93entltg3h.apps.googleusercontent.com';
const FOLDER_ID = '1gWSAVwiwe6cRKYmNE2Q3KOY15T-ubA39';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient, accessToken = null;
let selectedWorker = '', selectedClient = '', selectedLoc_ = '';
let selectedFiles = [];
let uploads = JSON.parse(localStorage.getItem('driveUploads') || '[]');
let workers = JSON.parse(localStorage.getItem('workers') || '[]');
let clients = JSON.parse(localStorage.getItem('clients') || '[]');

const now = new Date();
const pad = n => String(n).padStart(2,'0');
const dateKey = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
const dateLabel = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${['일','월','화','수','목','금','토'][now.getDay()]})`;

window.onload = () => {
  document.getElementById('dateDisplay').textContent = dateLabel;
  document.getElementById('headerDate').textContent = dateLabel;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showToast('로그인 실패: ' + resp.error, true); return; }
      accessToken = resp.access_token;
      document.getElementById('authBanner').style.display = 'none';
      showToast('✓ 로그인 완료!');
      updateBtn();
    }
  });
  document.getElementById('authBanner').style.display = accessToken ? 'none' : 'flex';
  renderManageLists();

  document.addEventListener('click', e => {
    ['worker','client'].forEach(type => {
      const input = document.getElementById(type + 'Search');
      const dropdown = document.getElementById(type + 'Dropdown');
      if (input && dropdown && !input.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.style.display = 'none';
      }
    });
  });
};

function signIn() { tokenClient.requestAccessToken({ prompt: 'consent' }); }

function switchTab(tab) {
  ['upload','gallery','manage'].forEach(t => {
    document.getElementById(t+'-view').style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((el, i) => {
    el.classList.toggle('active', ['upload','gallery','manage'][i] === tab);
  });
  document.getElementById('submitBar').style.display = tab === 'upload' ? 'block' : 'none';
  if (tab === 'gallery') renderGallery();
  if (tab === 'manage') renderManageLists();
}

function openDropdown(type) {
  const list = type === 'worker' ? workers : clients;
  renderDropdown(type, list);
  document.getElementById(type + 'Dropdown').style.display = 'block';
}

function filterList(type) {
  const query = document.getElementById(type + 'Search').value.trim().toLowerCase();
  const list = (type === 'worker' ? workers : clients).filter(item => item.toLowerCase().includes(query));
  renderDropdown(type, list);
  document.getElementById(type + 'Dropdown').style.display = 'block';
}

function renderDropdown(type, list) {
  const dropdown = document.getElementById(type + 'Dropdown');
  dropdown.innerHTML = list.length === 0
    ? `<div class="search-empty">검색 결과 없음<br><span style="font-size:11px;">⚙️ 관리 탭에서 추가해주세요</span></div>`
    : list.map(item => `<div class="search-item" onmousedown="selectItem('${type}','${item}')">${item}</div>`).join('');
}

function selectItem(type, value) {
  if (type === 'worker') {
    selectedWorker = value;
    document.getElementById('workerSelectedText').textContent = '👤 ' + value;
    document.getElementById('workerSelected').style.display = 'flex';
    document.getElementById('workerSearch').style.display = 'none';
    document.getElementById('workerDropdown').style.display = 'none';
    document.getElementById('workerSearch').value = '';
  } else {
    selectedClient = value;
    document.getElementById('clientSelectedText').textContent = '🏢 ' + value;
    document.getElementById('clientSelected').style.display = 'flex';
    document.getElementById('clientSearch').style.display = 'none';
    document.getElementById('clientDropdown').style.display = 'none';
    document.getElementById('clientSearch').value = '';
  }
  updateBtn();
}

function clearSearch(type) {
  if (type === 'worker') {
    selectedWorker = '';
    document.getElementById('workerSelected').style.display = 'none';
    document.getElementById('workerSearch').style.display = 'block';
    document.getElementById('workerSearch').value = '';
  } else {
    selectedClient = '';
    document.getElementById('clientSelected').style.display = 'none';
    document.getElementById('clientSearch').style.display = 'block';
    document.getElementById('clientSearch').value = '';
  }
  updateBtn();
}

function addWorker() {
  const val = document.getElementById('newWorkerInput').value.trim();
  if (!val || workers.includes(val)) return;
  workers.push(val);
  localStorage.setItem('workers', JSON.stringify(workers));
  document.getElementById('newWorkerInput').value = '';
  renderManageLists();
}

function addClient() {
  const val = document.getElementById('newClientInput').value.trim();
  if (!val || clients.includes(val)) return;
  clients.push(val);
  localStorage.setItem('clients', JSON.stringify(clients));
  document.getElementById('newClientInput').value = '';
  renderManageLists();
}

function deleteWorker(name) {
  workers = workers.filter(w => w !== name);
  localStorage.setItem('workers', JSON.stringify(workers));
  if (selectedWorker === name) clearSearch('worker');
  renderManageLists();
}

function deleteClient(name) {
  clients = clients.filter(c => c !== name);
  localStorage.setItem('clients', JSON.stringify(clients));
  if (selectedClient === name) clearSearch('client');
  renderManageLists();
}

function renderManageLists() {
  document.getElementById('workerManageList').innerHTML = workers.length === 0
    ? '<div style="font-size:13px;color:var(--muted);padding:8px 0;">등록된 직원이 없어요</div>'
    : workers.map(w => `<div class="manage-list-item"><span>👤 ${w}</span><button class="del-btn" onclick="deleteWorker('${w}')">×</button></div>`).join('');
  document.getElementById('clientManageList').innerHTML = clients.length === 0
    ? '<div style="font-size:13px;color:var(--muted);padding:8px 0;">등록된 거래처가 없어요</div>'
    : clients.map(c => `<div class="manage-list-item"><span>🏢 ${c}</span><button class="del-btn" onclick="deleteClient('${c}')">×</button></div>`).join('');
}

function selectLoc(btn, loc) {
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedLoc_ = loc;
  document.getElementById('customLocWrap').classList.toggle('visible', loc === '직접입력');
  if (loc !== '직접입력') updateBtn();
}

function buildFileName(index) {
  const custom = document.getElementById('customLoc').value.trim();
  const loc = selectedLoc_ === '직접입력' ? custom : selectedLoc_;
  return `${dateKey}_${selectedClient}_${loc}_${String(index+1).padStart(3,'0')}.jpg`;
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      selectedFiles.push({ data: e.target.result, file });
      renderPreviews(); updateBtn();
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  const custom = document.getElementById('customLoc').value.trim();
  const loc = selectedLoc_ === '직접입력' ? custom : selectedLoc_;
  document.getElementById('previewGrid').innerHTML = selectedFiles.map((f, i) => {
    const fname = (selectedClient && loc) ? buildFileName(i) : `사진_${String(i+1).padStart(3,'0')}.jpg`;
    return `<div class="preview-item">
      <img src="${f.data}" alt="">
      <div class="preview-label">${fname}</div>
      <button class="preview-remove" onclick="removePhoto(${i})">✕</button>
    </div>`;
  }).join('');
  document.getElementById('photoCount').textContent = selectedFiles.length > 0 ? `${selectedFiles.length}장 선택됨` : '';
}

function removePhoto(i) { selectedFiles.splice(i, 1); renderPreviews(); updateBtn(); }

function updateBtn() {
  const custom = document.getElementById('customLoc').value.trim();
  const loc = selectedLoc_ === '직접입력' ? custom : selectedLoc_;
  renderPreviews();
  document.getElementById('submitBtn').disabled = !(accessToken && selectedWorker && selectedClient && loc && selectedFiles.length > 0);
}

async function submitUpload() {
  if (!accessToken) { showToast('먼저 로그인해 주세요', true); return; }
  const custom = document.getElementById('customLoc').value.trim();
  const loc = selectedLoc_ === '직접입력' ? custom : selectedLoc_;
  const notes = document.getElementById('notes').value.trim();

  showProgress(true, '폴더 준비 중...', 0);
  const parentFolderName = `${dateKey}_${selectedClient}_${selectedWorker}`;
  const parentFolderId = await findOrCreateFolder(parentFolderName, FOLDER_ID);
  const subFolderId = await findOrCreateFolder(loc, parentFolderId);

  for (let i = 0; i < selectedFiles.length; i++) {
    updateProgress(`사진 업로드 중 (${i+1}/${selectedFiles.length})`, Math.round(((i+1)/selectedFiles.length)*90));
    const renamed = new File([selectedFiles[i].file], buildFileName(i), { type: selectedFiles[i].file.type });
    await uploadFileToDrive(renamed, subFolderId);
  }

  if (notes) {
    const content = `날짜: ${dateLabel}\n직원: ${selectedWorker}\n거래처: ${selectedClient}\n장소: ${loc}\n\n메모:\n${notes}`;
    await uploadTextToDrive('메모.txt', content, subFolderId);
  }

  updateProgress('완료!', 100);
  uploads.unshift({ id: Date.now(), worker: selectedWorker, client: selectedClient, location: loc, notes, timestamp: dateLabel, folderId: parentFolderId, photoCount: selectedFiles.length });
  localStorage.setItem('driveUploads', JSON.stringify(uploads));

  setTimeout(() => {
    showProgress(false);
    showToast(`✓ ${selectedFiles.length}장 드라이브에 저장 완료!`);
    document.getElementById('notes').value = '';
    document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('customLocWrap').classList.remove('visible');
    document.getElementById('customLoc').value = '';
    selectedLoc_ = ''; selectedFiles = [];
    renderPreviews(); updateBtn();
  }, 600);
}

async function findOrCreateFolder(name, parentId) {
  const q = `name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`, { headers: { Authorization: `Bearer ${accessToken}` } });
  const data = await res.json();
  if (data.files && data.files.length > 0) return data.files[0].id;
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST', headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  return (await create.json()).id;
}

async function uploadFileToDrive(file, folderId) {
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({ name: file.name, parents: [folderId] })], { type: 'application/json' }));
  form.append('file', file);
  await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { Authorization: `Bearer ${accessToken}` }, body: form });
}

async function uploadTextToDrive(name, content, folderId) {
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({ name, parents: [folderId] })], { type: 'application/json' }));
  form.append('file', new Blob([content], { type: 'text/plain' }));
  await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { Authorization: `Bearer ${accessToken}` }, body: form });
}

function showProgress(show, text='', pct=0) {
  document.getElementById('progressOverlay').classList.toggle('show', show);
  if (text) document.getElementById('progressSub').textContent = text;
  document.getElementById('progressFill').style.width = pct + '%';
}
function updateProgress(text, pct) {
  document.getElementById('progressSub').textContent = text;
  document.getElementById('progressFill').style.width = pct + '%';
}
function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (error ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function renderGallery(filter) {
  const filtered = filter ? uploads.filter(u => u.client === filter) : uploads;
  const allClients = ['전체', ...new Set(uploads.map(u => u.client))];
  document.getElementById('filterRow').innerHTML = allClients.map(c => `
    <button class="filter-chip ${(!filter && c==='전체') || filter===c ? 'active' : ''}"
      onclick="renderGallery(${c==='전체' ? 'null' : `'${c}'`})">${c}</button>`).join('');
  const content = document.getElementById('galleryContent');
  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><p>아직 업로드된 기록이 없어요</p></div>`;
    return;
  }
  content.innerHTML = filtered.map(u => `
    <div class="gallery-card">
      <div class="gallery-card-header">
        <div class="gallery-card-name">🏢 ${u.client} · 👤 ${u.worker}</div>
        <div class="gallery-card-meta">${u.timestamp} · 📍 ${u.location} · 사진 ${u.photoCount}장</div>
      </div>
      ${u.notes ? `<div class="gallery-note">💬 ${u.notes}</div>` : ''}
      <div class="gallery-link"><a href="https://drive.google.com/drive/folders/${u.folderId}" target="_blank">📁 드라이브에서 사진 보기 →</a></div>
    </div>`).join('');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.activeElement.id === 'newWorkerInput') addWorker();
    if (document.activeElement.id === 'newClientInput') addClient();
  }
});
</script>
